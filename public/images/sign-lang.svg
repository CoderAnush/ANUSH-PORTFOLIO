<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="slGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8e44ad;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3498db;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#slGrad)"/>
  
  <!-- Title -->
  <text x="200" y="60" font-size="32" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">Sign Language</text>
  <text x="200" y="100" font-size="32" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">Transcript</text>
  
  <!-- Hand pose skeleton visualization -->
  <!-- Left hand points -->
  <circle cx="100" cy="150" r="6" fill="rgba(255,255,255,0.8)"/>
  <circle cx="85" cy="130" r="5" fill="rgba(255,255,255,0.7)"/>
  <circle cx="115" cy="130" r="5" fill="rgba(255,255,255,0.7)"/>
  <circle cx="80" cy="110" r="4" fill="rgba(255,255,255,0.6)"/>
  <circle cx="120" cy="110" r="4" fill="rgba(255,255,255,0.6)"/>
  
  <!-- Left hand connections -->
  <line x1="100" y1="150" x2="85" y2="130" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  <line x1="100" y1="150" x2="115" y2="130" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  <line x1="85" y1="130" x2="80" y2="110" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  <line x1="115" y1="130" x2="120" y2="110" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  
  <!-- Right hand points -->
  <circle cx="300" cy="150" r="6" fill="rgba(255,255,255,0.8)"/>
  <circle cx="285" cy="130" r="5" fill="rgba(255,255,255,0.7)"/>
  <circle cx="315" cy="130" r="5" fill="rgba(255,255,255,0.7)"/>
  <circle cx="280" cy="110" r="4" fill="rgba(255,255,255,0.6)"/>
  <circle cx="320" cy="110" r="4" fill="rgba(255,255,255,0.6)"/>
  
  <!-- Right hand connections -->
  <line x1="300" y1="150" x2="285" y2="130" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  <line x1="300" y1="150" x2="315" y2="130" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  <line x1="285" y1="130" x2="280" y2="110" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  <line x1="315" y1="130" x2="320" y2="110" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  
  <!-- Tech stack -->
  <text x="200" y="250" font-size="14" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-family="Arial">MediaPipe • LSTM • OpenCV</text>
  <text x="200" y="275" font-size="12" fill="rgba(255,255,255,0.6)" text-anchor="middle" font-family="Arial">Computer Vision & Deep Learning</text>
</svg>