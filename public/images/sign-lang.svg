<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="slGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#slGrad)"/>
  
  <!-- Decorative background elements -->
  <circle cx="50" cy="50" r="30" fill="rgba(255,255,255,0.05)"/>
  <circle cx="350" cy="250" r="40" fill="rgba(255,255,255,0.05)"/>
  
  <!-- Title -->
  <text x="200" y="50" font-size="28" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">Sign Language</text>
  <text x="200" y="80" font-size="28" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">Transcript</text>
  
  <!-- Hand pose visualization with better styling -->
  <!-- Left hand -->
  <circle cx="90" cy="160" r="8" fill="#ffd700" filter="url(#glow)"/>
  <circle cx="70" cy="130" r="6" fill="#ffa500" filter="url(#glow)"/>
  <circle cx="110" cy="130" r="6" fill="#ffa500" filter="url(#glow)"/>
  <circle cx="60" cy="100" r="5" fill="#ff6b6b" filter="url(#glow)"/>
  <circle cx="120" cy="100" r="5" fill="#ff6b6b" filter="url(#glow)"/>
  <circle cx="90" cy="80" r="4" fill="#ff6b6b" filter="url(#glow)"/>
  
  <!-- Left hand connections -->
  <line x1="90" y1="160" x2="70" y2="130" stroke="#ff9800" stroke-width="3" opacity="0.8"/>
  <line x1="90" y1="160" x2="110" y2="130" stroke="#ff9800" stroke-width="3" opacity="0.8"/>
  <line x1="70" y1="130" x2="60" y2="100" stroke="#ff6b6b" stroke-width="2" opacity="0.8"/>
  <line x1="110" y1="130" x2="120" y2="100" stroke="#ff6b6b" stroke-width="2" opacity="0.8"/>
  <line x1="90" y1="130" x2="90" y2="80" stroke="#ff6b6b" stroke-width="2" opacity="0.8"/>
  
  <!-- Right hand -->
  <circle cx="310" cy="160" r="8" fill="#ffd700" filter="url(#glow)"/>
  <circle cx="290" cy="130" r="6" fill="#ffa500" filter="url(#glow)"/>
  <circle cx="330" cy="130" r="6" fill="#ffa500" filter="url(#glow)"/>
  <circle cx="280" cy="100" r="5" fill="#ff6b6b" filter="url(#glow)"/>
  <circle cx="340" cy="100" r="5" fill="#ff6b6b" filter="url(#glow)"/>
  <circle cx="310" cy="80" r="4" fill="#ff6b6b" filter="url(#glow)"/>
  
  <!-- Right hand connections -->
  <line x1="310" y1="160" x2="290" y2="130" stroke="#ff9800" stroke-width="3" opacity="0.8"/>
  <line x1="310" y1="160" x2="330" y2="130" stroke="#ff9800" stroke-width="3" opacity="0.8"/>
  <line x1="290" y1="130" x2="280" y2="100" stroke="#ff6b6b" stroke-width="2" opacity="0.8"/>
  <line x1="330" y1="130" x2="340" y2="100" stroke="#ff6b6b" stroke-width="2" opacity="0.8"/>
  <line x1="310" y1="130" x2="310" y2="80" stroke="#ff6b6b" stroke-width="2" opacity="0.8"/>
  
  <!-- Tech stack -->
  <rect x="40" y="225" width="320" height="55" fill="rgba(0,0,0,0.3)" rx="8"/>
  <text x="200" y="248" font-size="13" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">MediaPipe • LSTM • OpenCV</text>
  <text x="200" y="268" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle" font-family="Arial">Real-time Hand Pose Detection</text>
</svg>