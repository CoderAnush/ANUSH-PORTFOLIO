<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cricketGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="glowC">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#cricketGrad)"/>
  
  <!-- Decorative background -->
  <circle cx="80" cy="60" r="30" fill="rgba(255,255,255,0.05)"/>
  <circle cx="320" cy="240" r="40" fill="rgba(255,255,255,0.05)"/>
  
  <!-- Title -->
  <text x="200" y="50" font-size="28" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">Cricket Match</text>
  <text x="200" y="80" font-size="28" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">Predictor</text>
  
  <!-- Cricket bat -->
  <rect x="75" y="110" width="12" height="80" fill="rgba(139,69,19,0.8)" rx="6"/>
  <polygon points="81,110 75,100 87,100" fill="rgba(200,100,50,0.9)"/>
  
  <!-- Cricket ball -->
  <circle cx="130" cy="160" r="10" fill="rgba(220,20,60,0.9)" filter="url(#glowC)"/>
  <line x1="125" y1="160" x2="135" y2="160" stroke="white" stroke-width="1" opacity="0.7"/>
  
  <!-- Predictive analytics bars -->
  <rect x="160" y="165" width="14" height="25" fill="rgba(76,175,80,0.8)"/>
  <rect x="180" y="150" width="14" height="40" fill="rgba(76,175,80,0.8)"/>
  <rect x="200" y="155" width="14" height="35" fill="rgba(76,175,80,0.8)"/>
  <rect x="220" y="140" width="14" height="50" fill="rgba(76,175,80,0.9)" filter="url(#glowC)"/>
  <rect x="240" y="160" width="14" height="30" fill="rgba(76,175,80,0.8)"/>
  <rect x="260" y="155" width="14" height="35" fill="rgba(76,175,80,0.8)"/>
  
  <!-- Percentage indicator -->
  <text x="300" y="170" font-size="24" font-weight="bold" fill="#76b347" text-anchor="start" font-family="Arial">85%</text>
  
  <!-- Tech stack -->
  <rect x="30" y="230" width="340" height="50" fill="rgba(0,0,0,0.3)" rx="8"/>
  <text x="200" y="253" font-size="13" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">XGBoost • Pandas • Scikit-learn</text>
  <text x="200" y="270" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle" font-family="Arial">ML Match Prediction Engine</text>
</svg>