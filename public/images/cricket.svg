<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cricketGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3c72;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a5298;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#cricketGrad)"/>
  
  <!-- Title -->
  <text x="200" y="60" font-size="36" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">Cricket Match</text>
  <text x="200" y="100" font-size="36" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">Predictor</text>
  
  <!-- Cricket bat and ball -->
  <line x1="80" y1="150" x2="120" y2="180" stroke="rgba(255,255,255,0.6)" stroke-width="8"/>
  <circle cx="130" cy="175" r="8" fill="rgba(255,255,255,0.7)"/>
  
  <!-- Data visualization -->
  <rect x="140" y="170" width="12" height="30" fill="rgba(76,175,80,0.8)"/>
  <rect x="160" y="150" width="12" height="50" fill="rgba(76,175,80,0.8)"/>
  <rect x="180" y="160" width="12" height="40" fill="rgba(76,175,80,0.8)"/>
  <rect x="200" y="140" width="12" height="60" fill="rgba(76,175,80,0.8)"/>
  <rect x="220" y="155" width="12" height="45" fill="rgba(76,175,80,0.8)"/>
  <rect x="240" y="150" width="12" height="50" fill="rgba(76,175,80,0.8)"/>
  
  <!-- Tech stack -->
  <text x="200" y="250" font-size="14" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-family="Arial">XGBoost • Pandas • Numpy</text>
  <text x="200" y="275" font-size="12" fill="rgba(255,255,255,0.6)" text-anchor="middle" font-family="Arial">ML Prediction Engine</text>
</svg>