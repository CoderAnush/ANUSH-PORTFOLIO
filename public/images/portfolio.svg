<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="portfolioGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="glowP">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#portfolioGrad)"/>
  
  <!-- Decorative background -->
  <circle cx="80" cy="60" r="35" fill="rgba(255,255,255,0.05)"/>
  <circle cx="320" cy="240" r="45" fill="rgba(255,255,255,0.05)"/>
  
  <!-- Title -->
  <text x="200" y="50" font-size="26" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">3D Interactive</text>
  <text x="200" y="80" font-size="26" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">Portfolio</text>
  
  <!-- 3D Cube with rotation effect -->
  <g transform="translate(120, 140)">
    <!-- Back face -->
    <polygon points="0,0 40,20 40,60 0,40" fill="rgba(100,200,255,0.4)" stroke="rgba(100,200,255,0.8)" stroke-width="2"/>
    
    <!-- Left face -->
    <polygon points="0,0 0,40 30,60 30,20" fill="rgba(100,150,255,0.6)" stroke="rgba(100,200,255,0.8)" stroke-width="2" filter="url(#glowP)"/>
    
    <!-- Top face -->
    <polygon points="0,0 30,20 70,20 40,0" fill="rgba(150,200,255,0.8)" stroke="rgba(200,220,255,1)" stroke-width="2" filter="url(#glowP)"/>
    
    <!-- Right face -->
    <polygon points="40,0 70,20 70,60 40,40" fill="rgba(80,180,255,0.7)" stroke="rgba(100,200,255,0.8)" stroke-width="2" filter="url(#glowP)"/>
    
    <!-- Bottom face highlight -->
    <line x1="0" y1="40" x2="40" y2="60" stroke="rgba(200,220,255,0.5)" stroke-width="1.5"/>
    <line x1="40" y1="40" x2="70" y2="60" stroke="rgba(200,220,255,0.5)" stroke-width="1.5"/>
  </g>
  
  <!-- Rotation indicator -->
  <circle cx="280" cy="150" r="35" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" opacity="0.6"/>
  <path d="M 280 120 A 30 30 0 0 1 305 135" fill="none" stroke="rgba(0,255,136,0.8)" stroke-width="2" stroke-linecap="round" filter="url(#glowP)"/>
  <polygon points="310,138 315,130 312,145" fill="rgba(0,255,136,0.8)"/>
  
  <!-- Interactive indicator -->
  <circle cx="280" cy="180" r="8" fill="rgba(0,255,136,0.9)" filter="url(#glowP)"/>
  <text x="300" y="185" font-size="11" fill="rgba(0,255,136,0.9)" font-weight="bold" font-family="Arial">LIVE</text>
  
  <!-- Tech stack -->
  <rect x="30" y="235" width="340" height="50" fill="rgba(0,0,0,0.3)" rx="8"/>
  <text x="200" y="258" font-size="13" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">Next.js • Three.js • TypeScript • GSAP</text>
  <text x="200" y="275" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle" font-family="Arial">Generative AI & 3D Web Experience</text>
</svg>