<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="movieGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ee5a6f;stop-opacity:1" />
    </linearGradient>
    <filter id="glowM">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#movieGrad)"/>
  
  <!-- Decorative background -->
  <circle cx="50" cy="50" r="30" fill="rgba(255,255,255,0.05)"/>
  <circle cx="350" cy="250" r="40" fill="rgba(255,255,255,0.05)"/>
  
  <!-- Title -->
  <text x="200" y="50" font-size="26" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">Movie</text>
  <text x="200" y="80" font-size="26" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">Recommendation</text>
  
  <!-- Movie film strips -->
  <g transform="translate(60, 110)">
    <rect width="35" height="50" fill="rgba(0,0,0,0.3)" rx="3"/>
    <circle cx="8" cy="8" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="27" cy="8" r="3" fill="rgba(255,255,255,0.3)"/>
    <rect x="2" y="20" width="31" height="20" fill="rgba(255,200,0,0.6)"/>
    <circle cx="8" cy="42" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="27" cy="42" r="3" fill="rgba(255,255,255,0.3)"/>
  </g>
  
  <g transform="translate(115, 95)">
    <rect width="35" height="50" fill="rgba(0,0,0,0.3)" rx="3"/>
    <circle cx="8" cy="8" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="27" cy="8" r="3" fill="rgba(255,255,255,0.3)"/>
    <rect x="2" y="20" width="31" height="20" fill="rgba(0,200,255,0.6)"/>
    <circle cx="8" cy="42" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="27" cy="42" r="3" fill="rgba(255,255,255,0.3)"/>
  </g>
  
  <g transform="translate(170, 110)">
    <rect width="35" height="50" fill="rgba(0,0,0,0.3)" rx="3"/>
    <circle cx="8" cy="8" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="27" cy="8" r="3" fill="rgba(255,255,255,0.3)"/>
    <rect x="2" y="20" width="31" height="20" fill="rgba(0,255,136,0.6)"/>
    <circle cx="8" cy="42" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="27" cy="42" r="3" fill="rgba(255,255,255,0.3)"/>
  </g>
  
  <!-- Star ratings -->
  <g transform="translate(240, 130)">
    <polygon points="0,-5 1,-2 4,-2 2,0 3,3 0,1 -3,3 -2,0 -4,-2 -1,-2" fill="#ffd700" filter="url(#glowM)"/>
    <text x="15" y="3" font-size="14" fill="#ffd700" font-weight="bold" font-family="Arial">4.8/5</text>
  </g>
  
  <!-- Recommendation indicator -->
  <rect x="240" y="160" width="120" height="30" fill="rgba(0,255,136,0.2)" rx="5" stroke="rgba(0,255,136,0.5)" stroke-width="1.5"/>
  <text x="300" y="182" font-size="12" fill="rgba(0,255,136,1)" text-anchor="middle" font-weight="bold" font-family="Arial">✓ Recommended</text>
  
  <!-- Tech stack -->
  <rect x="30" y="235" width="340" height="50" fill="rgba(0,0,0,0.3)" rx="8"/>
  <text x="200" y="258" font-size="13" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">Python • Scikit-learn • Pandas • NLTK</text>
  <text x="200" y="275" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle" font-family="Arial">Content-Based & Collaborative Filtering</text>
</svg>